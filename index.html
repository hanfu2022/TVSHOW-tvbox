<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary file sharing</title>
   <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .upload-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            display: block;
            margin: 20px 0;
        }
        .file-list {
            margin-top: 20px;
        }
        .file-item {
            padding: 10px;
            background: #fff;
            margin: 10px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .upload-box {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="upload-box">
            <h2>Upload files or images</h2>
            <input type="file" id="fileInput" multiple>
            <button onclick="uploadFiles()">Upload</button>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>

    <script>
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            if (!files.length) {
                alert('Please select a file');
                return;
            }

            const fileList = document.getElementById('fileList');
            fileList.innerHTML = 'uploading...';

            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('https://nopng.hanfu2022.workers.dev/upload', {
                        method: 'POST',
                        body: formData,
                        signal: AbortSignal.timeout(30000)
                    });

                    if (response.ok) {
                        const { url, expires } = await response.json();
                        displayFile(file.name, url, expires);
                    } else {
                        throw new Error('upload fail');
                    }
                } catch (error) {
                    console.error('upload fail:', error);
                    alert('upload fail: ' + error.message);
                }
            }
        }

        function displayFile(name, url, expires) {
            const fileList = document.getElementById('fileList');
            const fileItem = document.createElement('div');
            fileItem.className = 'file-item';
            const expireTime = new Date(expires).toLocaleTimeString();
            fileItem.innerHTML = `
                <span>${name}</span>
                <a href="${url}" target="_blank">download (Effective to ${expireTime})</a>
            `;
            fileList.appendChild(fileItem);
        }
    </script>
    <script src="https://quge5.com/88/tag.min.js" data-zone="255291" async data-cfasync="false"></script>
    <script>(function(s){s.dataset.zone='11224364',s.src='https://al5sm.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</body>
</html>
